<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenChat - Chat Room</title>
    <!-- Google Fonts: Inter & Montserrat -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/chat.css">
</head>

<body>
    <div class="chat-dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="chat-sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        style="margin-right: 8px;">
                        <ellipse cx="12" cy="13" rx="2.5" ry="4.5" fill="var(--spidey-red)"
                            stroke="var(--spidey-red)" />
                        <circle cx="12" cy="7" r="1.8" fill="var(--spidey-red)" stroke="var(--spidey-red)" />
                        <path
                            d="M9.5 10C7.5 9 6 7 6 5M14.5 10C16.5 9 18 7 18 5M9 13C6.5 13 5.5 12.5 4.5 11M15 13C17.5 13 18.5 12.5 19.5 11M9.5 16C7.5 17 6 19 6 21M14.5 16C16.5 17 18 19 18 21"
                            stroke="var(--spidey-red)" stroke-linecap="round" />
                    </svg>
                    <span>OpenChat</span>
                </div>
                <button class="icon-btn" id="sidebar-close" title="Close Sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="sidebar-section">
                <h3 class="section-title">ROOMS</h3>
                <div class="room-list" id="sidebar-room-list">
                    <div class="room-item active" data-room="General">
                        <div class="room-hash">#</div>
                        <div class="room-info">
                            <span class="room-name">General</span>
                            <span class="room-online">12 online</span>
                        </div>
                    </div>
                    <div class="room-item" data-room="JavaScript">
                        <div class="room-hash">#</div>
                        <div class="room-info">
                            <span class="room-name">JavaScript</span>
                            <span class="room-online">8 online</span>
                        </div>
                    </div>
                    <div class="room-item" data-room="Movies">
                        <div class="room-hash">#</div>
                        <div class="room-info">
                            <span class="room-name">Movies</span>
                            <span class="room-online">5 online</span>
                        </div>
                    </div>
                    <div class="room-item" data-room="Sports">
                        <div class="room-hash">#</div>
                        <div class="room-info">
                            <span class="room-name">Sports</span>
                            <span class="room-online">7 online</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar-action">
                <button class="btn-outline w-100" id="btn-create-room">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Create New Room
                </button>
            </div>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar" id="current-user-avatar">AK</div>
                    <div class="user-info">
                        <span class="user-name" id="current-user-name">Alex Kumar</span>
                        <span class="user-status"><span class="status-dot"></span> Online</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Header -->
            <header class="chat-header">
                <div class="chat-header-left">
                    <button class="icon-btn" id="sidebar-toggle" title="Toggle Sidebar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <div class="chat-header-info">
                        <h2 id="chat-room-title"># General</h2>
                        <span class="chat-header-subtitle" id="chat-room-count">12 members online</span>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="icon-btn" title="Members">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span>12</span>
                    </button>
                    <button class="icon-btn" title="Notifications">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                    </button>
                    <button class="icon-btn text-danger" id="btn-leave-room" title="Leave Room">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Messages Area -->
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be dynamically rendered here -->
            </div>

            <!-- Input Area -->
            <div class="chat-input-container">
                <form id="chat-form" class="chat-input-wrapper">
                    <button type="button" class="icon-btn input-action" title="Emoji">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                            <line x1="9" y1="9" x2="9.01" y2="9"></line>
                            <line x1="15" y1="9" x2="15.01" y2="9"></line>
                        </svg>
                    </button>
                    <div class="input-field-wrapper">
                        <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off"
                            required>
                        <span class="input-hint">Press Enter to send</span>
                    </div>
                    <button type="button" class="icon-btn input-action" title="Attachment">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                            </path>
                        </svg>
                    </button>
                    <button type="submit" class="btn-send">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/chat.js"></script>
</body>

</html>
